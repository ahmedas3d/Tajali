<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- String loop -->
  <circle cx="12" cy="11" r="7.5" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
  <!-- Pendant string -->
  <line x1="12" y1="18.5" x2="12" y2="22.5" stroke="#C9A84C" stroke-width="1.2"/>
  <!-- Pendant bead (teardrop tip) -->
  <ellipse cx="12" cy="23.2" rx="1" ry="1.3" fill="#C9A84C"/>
  <!-- Head bead (larger, top) -->
  <circle cx="12" cy="3.5" r="2.2" fill="#C9A84C"/>
  <!-- Left upper bead -->
  <circle cx="5.5" cy="7.3" r="1.7" fill="#C9A84C"/>
  <!-- Left lower bead -->
  <circle cx="5.5" cy="14.7" r="1.7" fill="#C9A84C"/>
  <!-- Bottom bead -->
  <circle cx="12" cy="18.5" r="1.7" fill="#C9A84C"/>
  <!-- Right lower bead -->
  <circle cx="18.5" cy="14.7" r="1.7" fill="#C9A84C"/>
  <!-- Right upper bead -->
  <circle cx="18.5" cy="7.3" r="1.7" fill="#C9A84C"/>
</svg>
