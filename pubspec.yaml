name: tajali
description: "تَجَلِّي — Islamic companion app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Fonts
  google_fonts: ^6.2.1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Location & Compass
  geolocator: ^11.0.0
  flutter_compass: ^0.8.0
  permission_handler: ^11.3.1

  # Prayer Times
  adhan: ^2.0.0+1

  # Audio
  just_audio: ^0.9.38

  # Notifications
  flutter_local_notifications: ^17.2.2

  # UI Extras
  flutter_svg: ^2.0.10+1
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/
    - assets/audio/
    - assets/data/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran.ttf
